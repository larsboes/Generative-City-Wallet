name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Setup Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --dev

      - name: Lint (ruff)
        run: uv run ruff check apps/api/src/spark tests scripts

      - name: Format check (ruff)
        run: uv run ruff format --check apps/api/src/spark tests scripts

      - name: Type check (pyright)
        run: uv run pyright apps/api/src/spark/

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install JS dependencies
        run: npm ci

      - name: Typecheck (JS workspaces)
        run: npm run typecheck

      - name: Contract symbol guard (TS ↔ Python)
        run: npm run test:contracts

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint-typecheck
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Setup Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --dev

      - name: Run tests
        run: uv run pytest tests/ -v --tb=short
        env:
          SPARK_DB_PATH: "/tmp/spark_ci_test.db"

      - name: Verify server starts
        run: |
          PYTHONPATH=apps/api/src uv run uvicorn spark.main:app --port 8000 &
          sleep 3
          curl -sf http://localhost:8000/api/health
          kill %1

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Setup Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --dev

      - name: Audit dependencies (pip-audit)
        run: uv run pip-audit --ignore-vuln CVE-2026-3219

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: cyclonedx-json
          artifact-name: sbom.cyclonedx.json
          upload-artifact: true

      - name: Scan SBOM for vulnerabilities (Grype)
        uses: anchore/scan-action@v6
        with:
          path: .
          fail-build: false
          severity-cutoff: high

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [test, security]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: spark-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan Docker image (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: spark-backend:${{ github.sha }}
          format: table
          severity: CRITICAL,HIGH
          exit-code: 0
